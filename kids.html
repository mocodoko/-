<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>キッズタッチゲーム</title>
<style>
body {
  margin:0;
  background:#fff7f0;
  font-family:sans-serif;
  text-align:center;
}

h1 {
  margin:10px;
  color:#ff6b81;
}

#game {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:10px;
}

.card {
  width:100px;
  height:100px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

.card img {
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>
</head>

<body>

<h1>タップしてね👆</h1>

<div id="game"></div>

<!-- 音はこれ1つだけ -->
<audio id="sound" src="get.mp3"></audio>

<script>
const images = [
  "baba.png",
  "kei.png",
  "nagomi.png",
  "oyako.png",
  "yukinago.png",
  "karan.png",
  "sauaka.png",
  "uedake.png",
  "reiko.png"
];

const game = document.getElementById("game");
const sound = document.getElementById("sound");

let count = 0;

// スマホ対策（最初のタップで音OKにする）
document.addEventListener("touchstart", () => {
  sound.play().then(()=>sound.pause());
}, { once:true });

images.forEach(src => {
  const div = document.createElement("div");
  div.className = "card";

  const img = document.createElement("img");
  img.src = src;

  div.appendChild(img);

  div.addEventListener("click", () => {
    sound.currentTime = 0;
    sound.play();

    div.style.transform = "scale(0)";
    setTimeout(() => div.remove(), 200);

    count++;

    if(count === images.length){
      setTimeout(() => {
        alert("ぜんぶできた！✨");
      }, 300);
    }
  });

  game.appendChild(div);
});
</script>

</body>
</html>
